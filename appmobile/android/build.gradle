buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Gradle 9.0 enforces explicit task dependencies. react-native-google-signin has an
// implicit dependency between releaseSourcesJar and generateCodegenArtifactsFromSchema
// that Gradle 9 rejects. gradle.projectsEvaluated runs after all projects are fully
// configured, avoiding the "already evaluated" error from afterEvaluate.
gradle.projectsEvaluated {
    subprojects { project ->
        def releaseSourcesJar = project.tasks.findByName('releaseSourcesJar')
        def generateCodegen = project.tasks.findByName('generateCodegenArtifactsFromSchema')
        if (releaseSourcesJar != null && generateCodegen != null) {
            releaseSourcesJar.dependsOn(generateCodegen)
        }
    }
}
