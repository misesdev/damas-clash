name: Damas Clash

summary: Play checkers online against real players in fast and competitive matches. Create games with or without bets and compete for satoshis via Lightning while testing your strategy and climbing the leaderboard.

description: |
  **Play checkers online with real players.**

  Challenge opponents from anywhere in fast, strategic, and competitive matches. The app offers a simple and smooth experience for fans of the classic checkers game, with real-time matches and quick game creation.

  You can create or join games with or without bets, making the experience even more exciting. In wagered matches, players compete for satoshis using the Bitcoin Lightning Network, with fast payments and low fees.

  **Key features:**

  * Real-time online checkers matches
  * Play against real players
  * Create games with or without bets
  * Compete for satoshis via Lightning
  * Simple and fast interface
  * Leaderboard to track your progress

  Test your strategy, challenge other players, and prove that you are the best on the board.

