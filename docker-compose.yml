services:
  postgres:
    image: postgres:16-alpine
    container_name: damas-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-db_damas}
      POSTGRES_USER: ${DB_USERNAME:-mises}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mises}
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mises} -d ${DB_DATABASE:-db_damas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: damas-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: damas-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=${DB_PORT:-5432};Database=${DB_DATABASE:-db_damas};Username=${DB_USERNAME:-mises};Password=${DB_PASSWORD:-mises}
      Redis__Configuration: redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "8080:8080"
    restart: unless-stopped

  appweb:
    build:
      context: ./appweb
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: damas-appweb
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
